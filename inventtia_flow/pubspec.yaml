name: inventtia_flow
description: "Flow - Gestión de colas y turnos de servicios"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.4

  # State Management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Local Storage
  shared_preferences: ^2.3.5

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Splash nativo
  flutter_native_splash: ^2.4.3

  # HTTP
  http: ^1.2.2

  # Utils
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#FFFFFF"
    theme_color: "#1565C0"
  windows:
    generate: true
    image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo.png
  color_dark: "#FFFFFF"
  image_dark: assets/images/logo.png
  android_12:
    image: assets/images/logo.png
    icon_background_color: "#FFFFFF"
  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
