<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codigo de referido - Carnaval Tienda</title>
    <meta name="description" content="Activa tu codigo de referido para Carnaval Tienda y descarga la app desde Google Play.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="assets/images/ic.png">
    <style>
        :root {
            color-scheme: light dark;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1a1a1a;
        }
        .card {
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            max-width: 420px;
            width: 100%;
            padding: 32px 24px;
            text-align: center;
        }
        .logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 16px;
            border-radius: 18px;
            background: #fff7ed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 22px;
            font-weight: 700;
        }
        p {
            margin: 0 0 20px;
            font-size: 14px;
            color: #555;
            line-height: 1.5;
        }
        .code-box {
            font-family: "SF Mono", Consolas, "Roboto Mono", monospace;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            background: #fff7ed;
            border: 1px dashed #ff6b35;
            color: #d24a00;
            padding: 14px;
            border-radius: 10px;
            margin: 0 0 22px;
            user-select: all;
        }
        .status {
            font-size: 13px;
            color: #2e7d32;
            margin: 0 0 18px;
            min-height: 18px;
        }
        .status.error { color: #c62828; }
        .btn {
            display: inline-block;
            background: #ff6b35;
            color: #fff;
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            width: 100%;
            border: 0;
            cursor: pointer;
            transition: transform 0.08s ease, background 0.15s ease;
        }
        .btn:hover { background: #e85a2a; }
        .btn:active { transform: scale(0.98); }
        .btn.secondary {
            background: transparent;
            color: #ff6b35;
            border: 1px solid #ff6b35;
            margin-top: 10px;
        }
        .small {
            font-size: 11px;
            color: #888;
            margin-top: 18px;
            line-height: 1.4;
        }
        .countdown {
            font-weight: 700;
            color: #ff6b35;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="logo">🎁</div>
        <h1>Tu codigo de referido</h1>
        <p>Lo copiamos a tu portapapeles. Instala la app y al registrarte se aplicara automaticamente.</p>
        <div id="code" class="code-box">--------</div>
        <div id="status" class="status">Preparando...</div>
        <a id="goStore" class="btn" href="#" rel="noopener">Abrir tienda</a>
        <button id="copyBtn" class="btn secondary" type="button">Copiar codigo otra vez</button>
        <p class="small">Te llevamos a Google Play o App Store segun tu dispositivo. Al abrir la app por primera vez se aplica solo.</p>
    </main>
    <script>
        (function () {
            var PLAY_URL = "https://play.google.com/store/apps/details?id=com.carnaval24&hl=es_419";
            var APPSTORE_URL = "https://apps.apple.com/es/app/carnaval-tienda/id6742862060";
            var CLIPBOARD_PREFIX = "CARNAVAL-REF:";

            // Deteccion simple iOS vs Android. En iPadOS 13+ el UA dice "Mac"
            // pero hay touch, asi que lo cubrimos con la heuristica de maxTouchPoints.
            var ua = navigator.userAgent || "";
            var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
            var STORE_URL = isIOS ? APPSTORE_URL : PLAY_URL;
            var STORE_LABEL = isIOS ? "App Store" : "Google Play";

            var params = new URLSearchParams(window.location.search);
            var raw = (params.get("code") || "").trim().toUpperCase();
            // Filtramos caracteres no validos (defensivo contra URLs raras).
            var code = raw.replace(/[^A-Z0-9]/g, "").slice(0, 16);

            var codeEl = document.getElementById("code");
            var statusEl = document.getElementById("status");
            var goStoreBtn = document.getElementById("goStore");
            var copyBtn = document.getElementById("copyBtn");

            goStoreBtn.href = STORE_URL;

            if (!code) {
                codeEl.textContent = "(sin codigo)";
                statusEl.textContent = "No se detecto codigo. Aun puedes descargar la app.";
                statusEl.classList.add("error");
                copyBtn.style.display = "none";
                goStoreBtn.textContent = "Abrir " + STORE_LABEL;
                return;
            }
            codeEl.textContent = code;

            var payload = CLIPBOARD_PREFIX + code;

            function copyPayload() {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    return navigator.clipboard.writeText(payload);
                }
                // Fallback execCommand para navegadores viejos.
                return new Promise(function (resolve, reject) {
                    try {
                        var ta = document.createElement("textarea");
                        ta.value = payload;
                        ta.setAttribute("readonly", "");
                        ta.style.position = "absolute";
                        ta.style.left = "-9999px";
                        document.body.appendChild(ta);
                        ta.select();
                        var ok = document.execCommand("copy");
                        document.body.removeChild(ta);
                        ok ? resolve() : reject(new Error("execCommand failed"));
                    } catch (e) { reject(e); }
                });
            }

            function markCopied() {
                statusEl.textContent = "Codigo copiado. Te llevamos a " + STORE_LABEL + "...";
                statusEl.classList.remove("error");
            }

            function markFailed() {
                statusEl.textContent = "No pudimos copiar automaticamente. Toca 'Copiar codigo' antes de abrir " + STORE_LABEL + ".";
                statusEl.classList.add("error");
            }

            copyPayload().then(markCopied).catch(markFailed);

            copyBtn.addEventListener("click", function () {
                copyPayload().then(function () {
                    statusEl.textContent = "Copiado.";
                    statusEl.classList.remove("error");
                }).catch(markFailed);
            });

            // Redirige automaticamente a la tienda despues de unos segundos para
            // dar tiempo al portapapeles. El usuario puede tocar el boton antes.
            var seconds = 3;
            function tick() {
                if (seconds > 0) {
                    goStoreBtn.textContent = "Abrir " + STORE_LABEL + " (" + seconds + ")";
                    seconds--;
                    setTimeout(tick, 1000);
                } else {
                    goStoreBtn.textContent = "Abrir " + STORE_LABEL;
                    window.location.href = STORE_URL;
                }
            }
            tick();
        })();
    </script>
</body>
</html>
