name: inventtia_muevete
description: "Muevete - Ride-hailing app for passenger transport"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.4

  # Maps & Location
  flutter_map: ^7.0.2
  flutter_map_tile_caching: ^10.0.0
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Compass / heading sensor
  flutter_compass_v2: ^1.0.3

  # HTTP
  http: ^1.3.0

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.3.5

  # URL Launcher (WhatsApp, phone calls)
  url_launcher: ^6.3.1

  # Image picking & compression
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Fonts & UI
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # Notifications (sound & vibration)
  audioplayers: ^6.1.0
  vibration: ^2.0.0

  # Background service & local notifications
  flutter_background_service: ^5.0.12
  flutter_local_notifications: ^18.0.1

  # Push notifications (Pushy.me)
  pushy_flutter: ^2.0.43

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  # Android adaptive icon (API 26+)
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  # iOS: remove alpha channel (App Store requires no transparency)
  remove_alpha_ios: true
  # Web
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#FFFFFF"
    theme_color: "#1A6FBF"
  # Windows
  windows:
    generate: true
    image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
